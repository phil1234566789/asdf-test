name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: restaurant-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: restaurant-app

      - name: Build
        run: npm run build -- --base-href /asdf-test/
        working-directory: restaurant-app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: restaurant-app/dist/restaurant-app/browser

      - id: deployment
        uses: actions/deploy-pages@v4
